<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS 订阅中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 2rem; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 1.5rem; text-align: center; }
    .feed-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .feed-info { flex: 1; }
    .feed-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.3rem; }
    .feed-desc { color: #6e6e73; font-size: 0.9rem; }
    .feed-actions { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; background: #0071e3; color: white; text-decoration: none; display: inline-block; }
    .btn-copy { background: #e8e8ed; color: #1d1d1f; }
    .btn:hover { opacity: 0.8; }
    .empty { text-align: center; color: #999; padding: 3rem 0; }
    footer { text-align: center; margin-top: 2rem; color: #86868b; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 RSS 订阅中心</h1>
    <div id="feed-list"></div>
    <footer>点击 <strong>复制链接</strong> 后在 RSS 阅读器中添加订阅</footer>
  </div>

  <script>
    (async function() {
      const listEl = document.getElementById('feed-list');
      try {
        const response = await fetch('feeds.json');
        if (!response.ok) throw new Error('无法加载 feeds.json');
        const feeds = await response.json();
        if (feeds.length === 0) {
          listEl.innerHTML = '<div class="empty">暂无订阅源</div>';
          return;
        }
        listEl.innerHTML = feeds.map(feed => {
          const fullUrl = new URL(feed.url, window.location.href).href;
          return `
            <div class="feed-card">
              <div class="feed-info">
                <div class="feed-title">${escapeHtml(feed.title)}</div>
                <div class="feed-desc">${escapeHtml(feed.description || '')}</div>
              </div>
              <div class="feed-actions">
                <a href="${fullUrl}" target="_blank" class="btn">打开</a>
                <button class="btn btn-copy" onclick="copyToClipboard('${fullUrl}', this)">复制链接</button>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        listEl.innerHTML = `<div class="empty">加载失败：${err.message}</div>`;
        console.error(err);
      }
    })();

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制!';
        setTimeout(() => { btn.textContent = '复制链接'; }, 2000);
      }).catch(() => {
        alert('复制失败，请手动复制：' + text);
      });
    }
  </script>
</body>
</html>
