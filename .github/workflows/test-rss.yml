name: Test RSS Generator

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行 RSS 生成脚本
        run: python generate_rss.py

      - name: 上传生成的 RSS 文件
        uses: actions/upload-artifact@v4
        with:
          name: rss-feed
          path: rss.xml